<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>北京三日 · 我们的行程</title>
<style>
  :root{
    --bg1:#fff4ef; --bg2:#ffe9ef; --bg3:#f3eeff;
    --ink:#5a4646; --soft:#9b8585; --line:#f0d9dd;
    --card:#ffffff; --rose:#e8859a; --rose-d:#d96c84;
    --gold:#d8a657;
    --t-调香:#caa6e8; --t-陶艺:#d99a6c; --t-拼豆:#7fb7d6;
    --t-看电影:#e5849b; --t-用餐:#e0a94e; --t-交通:#8fb98f;
    --t-休息:#b7a9c9; --t-其他:#b0a59b;
    --shadow:0 6px 22px rgba(180,120,130,.13);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
    color:var(--ink);
    background:linear-gradient(135deg,var(--bg1),var(--bg2) 45%,var(--bg3));
    background-attachment:fixed;
    line-height:1.6;padding:0 0 60px;
  }
  .wrap{max-width:1180px;margin:0 auto;padding:0 16px}

  /* ---------- Header ---------- */
  header{text-align:center;padding:42px 16px 26px}
  .kicker{font-size:13px;letter-spacing:6px;color:var(--rose-d);font-weight:600;margin-bottom:10px}
  h1{font-size:clamp(28px,5vw,46px);font-weight:800;letter-spacing:2px;
     background:linear-gradient(120deg,#d96c84,#c77fb0,#d8a657);
     -webkit-background-clip:text;background-clip:text;color:transparent}
  h1 .heart{-webkit-text-fill-color:initial;color:var(--rose);margin:0 8px}
  .subtitle{margin-top:12px;color:var(--soft);font-size:15px}
  .subtitle b{color:var(--rose-d)}

  /* ---------- Countdown / flight strip ---------- */
  .strip{display:flex;flex-wrap:wrap;gap:14px;justify-content:center;margin:24px 0 6px}
  .pill{background:var(--card);border-radius:16px;padding:14px 22px;box-shadow:var(--shadow);
        display:flex;flex-direction:column;align-items:center;min-width:140px}
  .pill .big{font-size:26px;font-weight:800;color:var(--rose-d);line-height:1.2}
  .pill .lbl{font-size:12px;color:var(--soft);margin-top:4px;letter-spacing:1px}
  .pill.fly .big{font-size:19px;color:var(--ink)}

  /* ---------- Toolbar ---------- */
  .toolbar{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:26px 0 8px}
  button.tool{border:1px solid var(--line);background:var(--card);color:var(--ink);
    padding:9px 16px;border-radius:999px;font-size:13px;cursor:pointer;font-weight:600;
    box-shadow:0 2px 8px rgba(180,120,130,.08);transition:.15s}
  button.tool:hover{transform:translateY(-1px);border-color:var(--rose);color:var(--rose-d)}
  button.tool.warn:hover{border-color:#d98a8a;color:#c25b5b}

  /* ---------- Checklist ---------- */
  .checklist{background:var(--card);border-radius:20px;box-shadow:var(--shadow);
    padding:18px 22px;margin:22px auto 4px;max-width:760px}
  .checklist h3{font-size:15px;color:var(--rose-d);margin-bottom:12px;letter-spacing:1px}
  .chips{display:flex;flex-wrap:wrap;gap:10px}
  .chip{display:flex;align-items:center;gap:7px;padding:8px 15px;border-radius:999px;
    font-size:14px;font-weight:600;background:#faf3f5;color:var(--soft);border:1.5px dashed #e7cdd3}
  .chip.done{background:#eef7ee;color:#4f8a52;border:1.5px solid #bcdcbd}
  .chip .dot{width:10px;height:10px;border-radius:50%;background:currentColor;opacity:.65}
  .chip.done .dot{opacity:1}

  /* ---------- Day board ---------- */
  .board{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:26px}
  @media(max-width:900px){.board{grid-template-columns:1fr}}
  .day{background:rgba(255,255,255,.72);backdrop-filter:blur(4px);
    border-radius:22px;box-shadow:var(--shadow);padding:18px 16px 20px;
    display:flex;flex-direction:column}
  .day-head{text-align:center;padding-bottom:14px;border-bottom:1px dashed var(--line);margin-bottom:14px}
  .day-head .dn{font-size:13px;letter-spacing:3px;color:var(--gold);font-weight:700}
  .day-head .dt{font-size:22px;font-weight:800;margin:4px 0}
  .day-head .dw{font-size:13px;color:var(--soft)}
  .day-head .note{margin-top:8px;font-size:12px;color:var(--rose-d);background:#fff0f3;
    display:inline-block;padding:4px 12px;border-radius:999px}

  .items{display:flex;flex-direction:column;gap:12px;flex:1}
  .item{background:#fff;border-radius:15px;padding:12px 12px 10px;
    border-left:5px solid var(--t-其他);box-shadow:0 2px 9px rgba(180,120,130,.07);
    transition:.15s;position:relative}
  .item.done{opacity:.62}
  .item.done .title-in{text-decoration:line-through}
  .item .row1{display:flex;align-items:center;gap:8px;margin-bottom:7px}
  .item input,.item textarea,.item select{font-family:inherit;color:var(--ink);
    border:1px solid transparent;background:#faf6f6;border-radius:8px;padding:5px 8px;
    font-size:14px;outline:none;transition:.12s;width:100%}
  .item input:focus,.item textarea:focus,.item select:focus{border-color:var(--rose);background:#fff}
  .time-in{width:74px!important;flex:none;font-weight:700;color:var(--rose-d);text-align:center}
  .title-in{font-weight:700;font-size:15px}
  .tag-sel{width:84px!important;flex:none;font-size:12px;cursor:pointer}
  .place-in{font-size:13px;color:var(--soft);margin-bottom:6px}
  .note-in{font-size:13px;resize:vertical;min-height:34px;color:#7a6a6a}
  .item .ctrl{display:flex;gap:6px;justify-content:flex-end;margin-top:8px;
    opacity:0;transition:.15s}
  .item:hover .ctrl,.item:focus-within .ctrl{opacity:1}
  .item .ctrl button{border:none;background:#f3eaec;color:var(--soft);width:26px;height:26px;
    border-radius:7px;cursor:pointer;font-size:13px;line-height:1}
  .item .ctrl button:hover{background:var(--rose);color:#fff}
  .item .ctrl .chk{margin-right:auto;display:flex;align-items:center;gap:5px;
    font-size:12px;color:var(--soft);opacity:1}
  .item .ctrl .chk input{width:auto}

  .add-btn{margin-top:14px;border:1.5px dashed #e7cdd3;background:transparent;
    color:var(--rose-d);padding:10px;border-radius:12px;cursor:pointer;font-size:14px;
    font-weight:600;transition:.15s}
  .add-btn:hover{background:#fff;border-color:var(--rose);border-style:solid}

  /* ---------- Notes board ---------- */
  .pad{background:var(--card);border-radius:20px;box-shadow:var(--shadow);
    padding:20px 22px;margin-top:24px}
  .pad h3{font-size:15px;color:var(--rose-d);margin-bottom:10px;letter-spacing:1px}
  .pad textarea{width:100%;border:1px solid var(--line);background:#fffafb;border-radius:12px;
    padding:12px;font-family:inherit;font-size:14px;color:var(--ink);min-height:90px;
    resize:vertical;outline:none;line-height:1.7}
  .pad textarea:focus{border-color:var(--rose)}

  footer{text-align:center;color:var(--soft);font-size:12px;margin-top:30px}
  .saved{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(20px);
    background:#5a4646;color:#fff;padding:8px 18px;border-radius:999px;font-size:13px;
    opacity:0;transition:.3s;pointer-events:none;z-index:50}
  .saved.show{opacity:.92;transform:translateX(-50%) translateY(0)}

  @media print{
    body{background:#fff}
    .toolbar,.add-btn,.item .ctrl,.saved{display:none!important}
    .day{box-shadow:none;border:1px solid #eee;break-inside:avoid}
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">B E I J I N G &nbsp;·&nbsp; 2 0 2 6</div>
    <h1>我们的<span class="heart">♥</span>北京三日</h1>
    <p class="subtitle">和你在 <b>北京</b> 见面 · <b>5月29日 周五</b> — <b>5月31日 周日</b><br>
       这份行程我们可以一起编辑，慢慢商量 ✎</p>

    <div class="strip">
      <div class="pill"><div class="big" id="cd">–</div><div class="lbl">天后见面</div></div>
      <div class="pill fly"><div class="big">5/29 · 09:40</div><div class="lbl">✈ 落地北京</div></div>
      <div class="pill fly"><div class="big">5/31 · 21:25</div><div class="lbl">✈ 离开北京</div></div>
    </div>
  </header>

  <div class="checklist">
    <h3>♥ 必做清单（我们想一起体验的）</h3>
    <div class="chips" id="chips"></div>
  </div>

  <div class="toolbar">
    <button class="tool" onclick="addItem(0)">＋ Day1 加一项</button>
    <button class="tool" onclick="addItem(1)">＋ Day2 加一项</button>
    <button class="tool" onclick="addItem(2)">＋ Day3 加一项</button>
    <!-- <button class="tool" onclick="exportData()">⬇ 导出（发给她）</button> -->
    <!-- <button class="tool" onclick="document.getElementById('imp').click()">⬆ 导入</button> -->
    <button class="tool" onclick="window.print()">🖨 打印 / 存PDF</button>
    <button class="tool warn" onclick="resetAll()">↺ 恢复默认</button>
    <input type="file" id="imp" accept="application/json" style="display:none" onchange="importData(this)">
  </div>

  <div class="board" id="board"></div>

  <div class="pad">
    <h3>✎ 共同备忘 · 想去的店 / 想吃的 / 给彼此的话</h3>
    <textarea id="memo" placeholder="比如：调香工作室提前预约、那家想试的餐厅、电影想看哪部……写在这里我们都能看到"></textarea>
  </div>

  <footer>这份行程保存在本设备浏览器里 · 改完点「导出」发给她，她「导入」就同步啦 ♥</footer>
</div>
<div class="saved" id="toast">已保存 ♥</div>

<script>
const KEY='beijing_trip_2026';
const TAGS=['调香','陶艺','拼豆','看电影','用餐','交通','休息','其他'];
const MUST=['调香','陶艺','拼豆','看电影'];

const DEFAULT={
  days:[
    {dn:'DAY 1',dt:'5月29日',dw:'周五',note:'09:40 落地 · 见面啦',items:[
      {time:'09:40',title:'抵达北京 ✈',tag:'交通',place:'首都 / 大兴机场',note:'落地报平安，见到你～',done:false},
      {time:'11:30',title:'放行李 + 第一顿饭',tag:'用餐',place:'酒店附近',note:'轻松点，慢慢聊',done:false},
      {time:'14:30',title:'调香体验',tag:'调香',place:'香水工作室（提前预约）',note:'一起调一瓶属于我们的味道 🌸',done:false},
      {time:'18:00',title:'晚餐',tag:'用餐',place:'她喜欢的菜系',note:'',done:false},
      {time:'19:40',title:'看电影 🎬',tag:'看电影',place:'附近影院',note:'选一部都想看的',done:false}
    ]},
    {dn:'DAY 2',dt:'5月30日',dw:'周六',note:'一整天都是我们的',items:[
      {time:'10:30',title:'陶艺体验',tag:'陶艺',place:'陶艺工作室（提前预约）',note:'拉坯做对杯子，烧好寄过来 🏺',done:false},
      {time:'13:00',title:'午餐 + 散步',tag:'用餐',place:'工作室附近小馆',note:'',done:false},
      {time:'15:00',title:'拼豆 DIY',tag:'拼豆',place:'手作店 / 带回酒店拼',note:'拼一个送给对方的小图案 🧩',done:false},
      {time:'18:30',title:'晚餐',tag:'用餐',place:'想试很久的那家',note:'',done:false},
      {time:'20:30',title:'夜里走走 / 聊天',tag:'休息',place:'街区 / 江边 / 公园',note:'慢慢走，不赶时间',done:false}
    ]},
    {dn:'DAY 3',dt:'5月31日',dw:'周日',note:'21:25 起飞 · 提前2h去机场',items:[
      {time:'10:00',title:'睡到自然醒 + 早午餐',tag:'用餐',place:'',note:'最后一天不慌不忙',done:false},
      {time:'13:00',title:'逛街 / 咖啡',tag:'休息',place:'她带路',note:'买点小纪念',done:false},
      {time:'17:00',title:'晚餐（提前一点）',tag:'用餐',place:'机场方向',note:'',done:false},
      {time:'18:40',title:'出发去机场 🚗',tag:'交通',place:'',note:'提前2小时，留足值机时间',done:false},
      {time:'21:25',title:'起飞 ✈ · 等下次再见',tag:'交通',place:'',note:'谢谢这三天 ♥',done:false}
    ]}
  ],
  memo:''
};

let data=load();

function load(){
  try{const r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT));
}
let toastT;
function save(){
  localStorage.setItem(KEY,JSON.stringify(data));
  const t=document.getElementById('toast');t.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),1100);
  renderChips();
}

function tagColor(tag){return getComputedStyle(document.documentElement).getPropertyValue('--t-'+tag)||'#b0a59b';}

function render(){
  const b=document.getElementById('board');b.innerHTML='';
  data.days.forEach((day,di)=>{
    const col=document.createElement('div');col.className='day';
    col.innerHTML=`<div class="day-head">
        <div class="dn">${day.dn}</div>
        <div class="dt">${day.dt}</div>
        <div class="dw">${day.dw}</div>
        <div class="note">${day.note}</div>
      </div><div class="items" id="items-${di}"></div>
      <button class="add-btn" onclick="addItem(${di})">＋ 添加一项</button>`;
    b.appendChild(col);
    const box=col.querySelector('#items-'+di);
    day.items.forEach((it,ii)=>box.appendChild(itemEl(di,ii,it)));
  });
  document.getElementById('memo').value=data.memo||'';
  renderChips();
}

function itemEl(di,ii,it){
  const d=document.createElement('div');
  d.className='item'+(it.done?' done':'');
  d.style.borderLeftColor=tagColor(it.tag).trim();
  const opts=TAGS.map(t=>`<option ${t===it.tag?'selected':''}>${t}</option>`).join('');
  d.innerHTML=`
    <div class="row1">
      <input class="time-in" value="${esc(it.time)}" placeholder="时间"
        onchange="upd(${di},${ii},'time',this.value)">
      <input class="title-in" value="${esc(it.title)}" placeholder="做什么"
        onchange="upd(${di},${ii},'title',this.value)">
      <select class="tag-sel" onchange="upd(${di},${ii},'tag',this.value);render()">${opts}</select>
    </div>
    <input class="place-in" value="${esc(it.place||'')}" placeholder="📍 地点（可空）"
      onchange="upd(${di},${ii},'place',this.value)">
    <textarea class="note-in" placeholder="备注 / 想说的话"
      onchange="upd(${di},${ii},'note',this.value)">${esc(it.note||'')}</textarea>
    <div class="ctrl">
      <label class="chk"><input type="checkbox" ${it.done?'checked':''}
        onchange="upd(${di},${ii},'done',this.checked);render()">完成</label>
      <button title="上移" onclick="move(${di},${ii},-1)">↑</button>
      <button title="下移" onclick="move(${di},${ii},1)">↓</button>
      <button title="删除" onclick="del(${di},${ii})">✕</button>
    </div>`;
  return d;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function upd(di,ii,k,v){data.days[di].items[ii][k]=v;save();}
function addItem(di){
  data.days[di].items.push({time:'',title:'',tag:'其他',place:'',note:'',done:false});
  save();render();
}
function del(di,ii){
  if(confirm('删除这一项？')){data.days[di].items.splice(ii,1);save();render();}
}
function move(di,ii,dir){
  const a=data.days[di].items,j=ii+dir;
  if(j<0||j>=a.length)return;
  [a[ii],a[j]]=[a[j],a[ii]];save();render();
}

function renderChips(){
  const used=new Set();
  data.days.forEach(d=>d.items.forEach(i=>{if(i.tag&&i.title.trim())used.add(i.tag);}));
  const c=document.getElementById('chips');c.innerHTML='';
  MUST.forEach(m=>{
    const on=used.has(m);
    const el=document.createElement('span');
    el.className='chip'+(on?' done':'');
    el.innerHTML=`<span class="dot"></span>${m}${on?' ✓':''}`;
    c.appendChild(el);
  });
}

document.getElementById('memo').addEventListener('change',e=>{data.memo=e.target.value;save();});

function exportData(){
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='北京行程_我们的.json';
  a.click();URL.revokeObjectURL(a.href);
}
function importData(inp){
  const f=inp.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=()=>{try{const j=JSON.parse(r.result);
    if(j.days){data=j;save();render();alert('导入成功 ♥ 行程已同步');}
    else alert('文件格式不对');
  }catch(e){alert('读取失败：'+e.message);}};
  r.readAsText(f);inp.value='';
}
function resetAll(){
  if(confirm('恢复成默认行程？你们的修改会清空。建议先导出备份。')){
    data=JSON.parse(JSON.stringify(DEFAULT));save();render();
  }
}

function countdown(){
  const trip=new Date(2026,4,29,9,40,0);
  const now=new Date();
  const days=Math.ceil((trip-now)/(1000*60*60*24));
  document.getElementById('cd').textContent=days>0?days:(days===0?'就今天':'进行中');
}

render();countdown();setInterval(countdown,60000);
</script>
</body>
</html>
